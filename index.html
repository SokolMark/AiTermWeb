<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiTerm — Умный переводчик</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="main-window.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<header class="site-header">
    <div class="container header-container">
        <div class="logo">
            <span class="logo-ai" style="color:#4a90e2">Ai</span><span class="logo-term" style="color:#8b90a0">Term</span>
        </div>
        <a href="#install" class="btn-outline">Установить</a>
    </div>
</header>

<section class="showcase-section">
    <div class="container showcase-container">
        <div class="showcase-visual">
            <div class="mockup-3d-wrapper">
                <div class="popup-container light-theme" id="main-mockup">
                    <div class="content-wrapper">

                        <header class="header">
                            <div class="header-left">
                                <div class="info-trigger">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                                </div>
                                <div class="theme-switch">
                                    <div class="theme-track"></div>
                                    <div class="theme-ball light">
                                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                                    </div>
                                </div>
                            </div>
                            <div class="header-title">
                                <span class="title-ai">Ai</span><span class="title-term">Term</span>
                            </div>
                            <div class="header-right">
                                <div class="save-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                                    <span class="save-text">Save</span>
                                </div>
                            </div>
                        </header>

                        <section class="translation-block">
                            <div class="text-box-wrapper">
                                <textarea class="text-box" readonly id="mockup-input">Vibe</textarea>
                            </div>
                            <div class="translation-arrow">
                                <div class="swap-btn" id="mockup-swap">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10L3 14L7 18"/><path d="M21 14H3"/><path d="M17 4L21 8L17 12"/><path d="M3 8H21"/></svg>
                                </div>
                            </div>
                            <div class="text-box-wrapper">
                                <textarea class="text-box" readonly id="mockup-output"></textarea>
                            </div>
                        </section>

                        <div class="controls-row">
                            <button class="lang-select-btn">
                                <img src="https://flagcdn.com/w40/gb.png" width="20" alt="flag" class="inline-flag"/> English
                            </button>
                            <button class="translate-action-btn" id="mockup-btn">Translate</button>
                            <button class="lang-select-btn">
                                <img src="https://flagcdn.com/w40/ru.png" width="20" alt="flag" class="inline-flag"/> Russian
                            </button>
                        </div>

                        <div class="separator-line"></div>

                        <div style="display: flex; width: 100%; margin-top: 10px; margin-bottom: 5px;">
                            <section class="level-section" style="flex: 1;">
                                <div class="level-indicator" id="mockup-level"></div>
                                <div class="level-hint">CEFR Level</div>
                            </section>
                            <section class="usage-section" style="flex: 1;">
                                <div class="usage-hint">Frequency</div>
                                <div class="usage-donut">
                                    <svg viewBox="0 0 80 80" class="donut-svg">
                                        <circle cx="40" cy="40" r="30" class="donut-track"></circle>
                                        <circle cx="40" cy="40" r="30" class="donut-fill" id="mockup-donut"></circle>
                                    </svg>
                                    <div class="usage-donut-number" id="mockup-donut-text"></div>
                                </div>
                            </section>
                        </div>

                        <section class="examples-section">
                            <div class="examples-header">
                                <div class="examples-title-container" id="title-container">
                                    <span class="examples-title active">Examples</span>
                                    <span class="examples-title">Synonyms</span>
                                    <span class="examples-title">Explanation</span>
                                </div>
                                <div class="examples-arrows-container">
                                    <div class="examples-arrow-button left-arrow"><svg width="46" height="30" viewBox="0 0 32 24" fill="transparent" stroke="currentColor" stroke-width="1.5"><path class="custom-arrow-path" d="M20 4l8 8-8 8v-5H4v-6h16V4z"/></svg></div>
                                    <div class="examples-arrow-button right-arrow"><svg width="46" height="30" viewBox="0 0 32 24" fill="transparent" stroke="currentColor" stroke-width="1.5"><path class="custom-arrow-path" d="M20 4l8 8-8 8v-5H4v-6h16V4z"/></svg></div>
                                </div>
                                <div class="content-lang-toggle">
                                    <img src="https://flagcdn.com/w80/ru.png" width="40" class="toggle-flag active" alt="Target"/>
                                </div>
                            </div>
                            <div class="carousel-container">
                                <div class="carousel-track tab-0" id="mockup-track">
                                    <div class="carousel-slide active-slide" id="slide-0">
                                        <div class="examples-content" id="content-0"></div>
                                    </div>
                                    <div class="carousel-slide" id="slide-1">
                                        <div class="examples-content" id="content-1"></div>
                                    </div>
                                    <div class="carousel-slide" id="slide-2">
                                        <div class="examples-content" id="content-2"></div>
                                    </div>
                                </div>
                                <div class="carousel-pagination" id="mockup-dots">
                                    <div class="dot active"></div>
                                    <div class="dot"></div>
                                    <div class="dot"></div>
                                </div>
                            </div>
                        </section>

                    </div>
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polygon points='3 3 10 21 14 14 21 10 3 3' fill='white'></polygon></svg>" class="mockup-cursor" id="mockup-cursor" alt="cursor">
                </div>
            </div>
        </div>
        <div class="showcase-content right-content">
            <h1 class="title">Словарь будущего</h1>
            <p class="subtitle">AiTerm воссоздает полное понимание слова. Получайте CEFR уровень, частоту использования, синонимы и живые примеры — все в одном окне.</p>
            <div class="cta-group">
                <a href="#install" class="btn-primary">Добавить в Chrome</a>
            </div>
        </div>
    </div>
</section>

<script src="script.js"></script>
<script src="main-window.js"></script>
</body>
</html>
